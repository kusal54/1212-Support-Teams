<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Bootstrap Linked -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-4bw+/aepP/YC94hEpVNVgiZdgIC5+VKNBQNGCHeKRQN+PtmoHDEXuppvnDJzQIu9" crossorigin="anonymous">
    <!-- CSS Linked -->
    <link rel="stylesheet" type="text/css" href="assets/css/style.css">
    <!-- Fontawesome Linked -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <!-- Font Linked -->
    <link href="https://fonts.googleapis.com/css2?family=Lato&display=swap" rel="stylesheet">
    <title>1212 Support Team</title>
</head>

<body>

    <div id="section-wrapper">
        <div class="form-background" id="mainMenu">
            <h1 class="login-title">1212 Support Team</h1>
            <ul class="main-menu">
                <a href="srm.html">
                    <li>Social Media Team <br> <i class="fa fa-user"></i></li>
                </a>
                <a href="email.html">
                    <li>1212 Email Team <br> <i class="fa fa-envelope"></i></li>
                </a>
            </ul>
        </div>

        <div class="form-background" id="srmLogin">
            <h1 class="login-title">CC Social Media Team Login</h1>
            <form id="login-form">
                <div class="form-group">
                    <label for="exampleInputEmail1">Email address</label>
                    <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp"
                        placeholder="Enter email">
                </div>
                <div class="form-group">
                    <label for="exampleInputPassword1">Password</label>
                    <input type="password" class="form-control" id="exampleInputPassword1" placeholder="Password">
                </div>
                <button type="submit" class="btn btn-primary" id="submitBtn">Submit</button>
            </form>
        </div>

        <div class="form-background" id="emailLogin">
            <h1 class="login-title">1212 Email Team Login</h1>
            <form id="login-form">
                <div class="form-group">
                    <label for="exampleInputEmail1">Email address</label>
                    <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp"
                        placeholder="Enter email">
                </div>
                <div class="form-group">
                    <label for="exampleInputPassword1">Password</label>
                    <input type="password" class="form-control" id="exampleInputPassword1" placeholder="Password">
                </div>
                <button type="submit" class="btn btn-primary" id="submitBtn">Submit</button>
            </form>
        </div>
    </div>

    <!-- Footer Section Start -->
    <section id="footer-section">
        <div class="footer-wrapper">
            <p class="footer-details">© SLT Contact Center All Rights Reserved</p>
            <p class="footer-details">Website Designed and Developed by Kusal Amarasinghe</p>
        </div>
    </section>
    <!-- Footer Section End -->


    <!-- JavaScript Linked -->
    <script src="assets/js/script.js"></script>
    
</body>

</html>
